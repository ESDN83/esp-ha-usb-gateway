esphome:
  name: usb-bridge
  friendly_name: USB TCP Bridge
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_USB_OTG_SUPPORTED: "y"
      CONFIG_USB_HOST_CONTROL_TRANSFER_MAX_SIZE: "1024"

# USB Bridge component from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/ESDN83/esp-ha-usb-gateway
      ref: master
    components: [usb_bridge]
    refresh: 1d

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "USB-Bridge"
    password: "usbbridge123"

captive_portal:

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

# USB Serial <-> TCP Bridge
# Config can be changed via web UI at http://<device-ip>:81/
# Web UI config (saved to NVS) overrides these YAML defaults
usb_bridge:
  devices:
    - name: "SkyConnect ZHA"
      vid: "10C4"
      pid: "EA60"
      port: 8880
      baud_rate: 115200
      interface: 0
      autoboot: true

    - name: "EnOcean USB 300"
      vid: "0403"
      pid: "6001"
      port: 8881
      baud_rate: 57600
      interface: 0
      autoboot: false
