esphome:
  name: usb-bridge
  friendly_name: USB TCP Bridge
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_USB_OTG_SUPPORTED: "y"
      CONFIG_USB_HOST_CONTROL_TRANSFER_MAX_SIZE: "1024"
      CONFIG_LWIP_MAX_SOCKETS: "20"

# USB Bridge component from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/ESDN83/esp-ha-usb-gateway
      ref: master
    components: [usb_bridge]
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "USB-Bridge"
    password: "usbbridge123"

# captive_portal removed — conflicts with USB config UI on port 80
# WiFi is already configured, captive portal not needed

logger:
  level: DEBUG
  hardware_uart: UART0  # CRITICAL: USB_SERIAL_JTAG (default) blocks GPIO19/20 needed for USB host!

# Reboot tests happen quickly; mark boot as good sooner to avoid OTA rollback
# when manually rebooting during USB reset verification.
safe_mode:
  boot_is_good_after: 5s
  num_attempts: 20

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# web_server removed — USB config UI runs on port 80 directly
# ESPHome API (port 6053) and OTA still work normally

# Built-in ESPHome sensors (replaces MQTT — no broker/credentials needed)
sensor:
  - platform: uptime
    name: Uptime
    entity_category: diagnostic

button:
  - platform: restart
    name: Restart

# USB Serial <-> TCP Bridge
# Device configuration is done via web UI at http://<device-ip>/
# Detected USB devices are shown automatically; assign TCP ports in the UI.
usb_bridge:
  devices_connected:
    name: "Devices Connected"
  firmware:
    name: "Firmware"
  device_list:
    name: "Device List"
